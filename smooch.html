      background: linear-gradient(to right, #ffccd5, #ffe6cc);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .fun-arena {
      background: #fff;
      padding: 2rem;
      border-radius: 25px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
      text-align: center;
      max-width: 420px;
    }
    h1 {
      color: #e91e63;
    }
    .action-btn {
      background: #ff4081;
      border: none;
      padding: 1rem 2rem;
      margin: 1rem;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .action-btn:hover {
      background: #c2185b;
    }
    #task-display {
      margin-top: 1rem;
      font-size: 1.2rem;
      color: #444;
    }
    select {
      margin-top: 1rem;
      padding: 0.6rem;
      border-radius: 10px;
      border: 1px solid #bbb;
    }
  </style>

        <option value="deep">Deep French</option>

      <button class="action-btn" onclick="revealSmooch()">Go!</button>
    </div>

    <div id="challenge-pick" style="display: none;">
      <p>Pick challenge level:</p>
      <select id="challengeLevel">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="bold">Bold</option>
        <option value="heated">Heated</option>
      </select>
      <button class="action-btn" onclick="revealChallenge()">Go!</button>
    </div>

    <div id="task-display"></div>
  </div>

      function launchSmooch() {
        document.getElementById('smooch-pick').style.display = 'block';
        document.getElementById('challenge-pick').style.display = 'none';
        document.getElementById('task-display').textContent = '';
      }

        document.getElementById('challenge-pick').style.display = 'block';
        document.getElementById('smooch-pick').style.display = 'none';
        document.getElementById('task-display').textContent = '';
      }
      
      function revealSmooch() {
        const selectedType = document.getElementById('smoochType').value;  // Get the selected type of kiss (gentle, intense, etc.)
        const smoochCategory = smoochList[selectedType];  // Retrieve the appropriate array for the selected kiss category
        
        const randomSmooch = smoochCategory[Math.floor(Math.random() * smoochCategory.length)];  // Pick a random kiss idea
        document.getElementById('task-display').textContent = randomSmooch;  // Display the selected smooch
      }
      
      function revealChallenge() {
        const level = document.getElementById('challengeLevel').value;  // Get the selected challenge level
        const challengeSet = challengeLevels[level];  // Retrieve the appropriate challenge set for the level
        
        const randomChallenge = challengeSet[Math.floor(Math.random() * challengeSet.length)];  // Pick a random challenge task
        document.getElementById('task-display').textContent = randomChallenge;  // Display the selected challenge
