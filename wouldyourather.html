  // ============================================================
  //  GAME LOGIC
  // ============================================================

  let currentIndex = 0;
  let currentQuestion = null;
  let userChoice = null; // 'A' or 'B'
  let history = [];
  let shuffled = [];

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initGame() {
    shuffled = shuffleArray([...questions]);
    currentIndex = 0;
    userChoice = null;
    history = [];
    showQuestion();
  }

  function showQuestion() {
    if (currentIndex >= shuffled.length) {
      // loop back
      shuffled = shuffleArray([...questions]);
      currentIndex = 0;
    }
    currentQuestion = shuffled[currentIndex];
    const q = currentQuestion;
    document.getElementById('questionDisplay').textContent = 'Would you rather...';
    document.getElementById('optionA').textContent = q.a;
    document.getElementById('optionB').textContent = q.b;
    document.getElementById('statA').textContent = q.stats.A + '%';
    document.getElementById('statB').textContent = q.stats.B + '%';
    document.getElementById('counterDisplay').textContent = `Question ${currentIndex + 1} / ${shuffled.length}`;
    document.getElementById('moodBadge').textContent = '❤️ choose your vibe';
    // reset selection style
    document.getElementById('optionA').className = 'option-btn';
    document.getElementById('optionB').className = 'option-btn';
    userChoice = null;
  }

  function selectOption(choice) {
    if (userChoice) return; // already selected
    userChoice = choice;
    const btnA = document.getElementById('optionA');
    const btnB = document.getElementById('optionB');
    btnA.className = 'option-btn';
    btnB.className = 'option-btn';
    if (choice === 'A') {
      btnA.classList.add('selected-a');
      btnB.classList.add('selected-b'); // subtle contrast
    } else {
      btnB.classList.add('selected-b');
      btnA.classList.add('selected-a');
    }
    // log history
    history.push({ question: currentQuestion, choice: choice });
    // update mood
    document.getElementById('moodBadge').textContent = choice === 'A' ? '💖 you chose A' : '💜 you chose B';
  }

  function nextQuestion() {
    currentIndex++;
    showQuestion();
  }

  function surpriseMe() {
    // pick a random question from the list
    const randomIdx = Math.floor(Math.random() * shuffled.length);
    currentIndex = randomIdx;
    userChoice = null;
    showQuestion();
    document.getElementById('moodBadge').textContent = '🎲 surprise!';
  }

  function resetGame() {
    initGame();
    document.getElementById('moodBadge').textContent = '🔄 fresh start';
  }

  // Event listeners
  document.getElementById('optionA').addEventListener('click', () => selectOption('A'));
  document.getElementById('optionB').addEventListener('click', () => selectOption('B'));
  document.getElementById('nextBtn').addEventListener('click', nextQuestion);
  document.getElementById('surpriseBtn').addEventListener('click', surpriseMe);
  document.getElementById('resetBtn').addEventListener('click', resetGame);

  // Start
  window.onload = initGame;
